dns:
  listen: "0.0.0.0"
  port: 5300
  tcp: true
  udp: true
  udp_size: 1232  # EDNS0 UDP 버퍼 크기 (1232=권장, 1410=Cloudflare, 4096=최대)
  nsid: ""        # EDNS0 NSID (비어있으면 hostname 사용)
  version: ""     # CHAOS version.bind 응답 (비어있으면 "DNS-Go v0.2.0")

upstream:
  timeout: 5s

web:
  listen: "0.0.0.0"
  port: 8080

database:
  path: "./dns-go.db"

geoip:
  city_db: "./GeoLite2-City.mmdb"

adblock:
  enabled: true
  sync_interval: 1h
  block_response: "0.0.0.0"

logging:
  level: "info"
  query_log:
    enabled: true
    retention_days: 7
    flush_interval: 2s
    buffer_size: 1000
