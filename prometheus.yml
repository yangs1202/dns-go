global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "dns-go"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "localhost:8080"
        labels:
          host: "local"
          environment: "production"
